stages:
  data_ingestion:
    cmd: python src/GNNClassfier/pipeline/stage_01_data_ingestion.py
    deps:
      - src/GNNClassfier/pipeline/stage_01_data_ingestion.py
      - config/config.yaml
    outs:
      - artifacts/data_ingestion/raw/hiv_dataset/HIV.csv

  data_transformation:
    cmd: python src/GNNClassfier/pipeline/stage_02_data_transformation.py
    deps:
      - src/GNNClassfier/pipeline/stage_02_data_transformation.py
      - artifacts/data_ingestion/raw/hiv_dataset/HIV.csv
    outs:
      - artifacts/data_transformation/train.csv
      - artifacts/data_transformation/test.csv

  dataset_preparation:
    cmd: python src/GNNClassfier/pipeline/stage_03_dataset_preparation.py
    deps:
      - src/GNNClassfier/pipeline/stage_03_dataset_preparation.py
      - artifacts/data_transformation/train.csv
      - artifacts/data_transformation/test.csv
    outs:
      - artifacts/data_preparation/train_graphs
      - artifacts/data_preparation/test_graphs