stages:
  data_ingestion:
    cmd: python src/GNNClassfier/pipeline/stage_01_data_ingestion.py
    deps:
      - src/GNNClassfier/pipeline/stage_01_data_ingestion.py
      - config/config.yaml
    outs:
      - artifacts/data_ingestion/raw/hiv_dataset/HIV.csv

  data_transformation:
    cmd: python src/GNNClassfier/pipeline/stage_02_data_transformation.py
    deps:
      - src/GNNClassfier/pipeline/stage_02_data_transformation.py
      - artifacts/data_ingestion/raw/hiv_dataset/HIV.csv
    outs:
      - artifacts/data_transformation/train.csv
      - artifacts/data_transformation/test.csv

  dataset_preparation:
    cmd: python src/GNNClassfier/pipeline/stage_03_dataset_preparation.py
    deps:
      - src/GNNClassfier/pipeline/stage_03_dataset_preparation.py
      - artifacts/data_transformation/train.csv
      - artifacts/data_transformation/test.csv
    outs:
      - artifacts/data_preparation/train_graphs
      - artifacts/data_preparation/test_graphs

  prepare_model:
    cmd: python src/GNNClassfier/pipeline/stage_04_prepare_model.py
    deps:
      - python src/GNNClassfier/pipeline/stage_04_prepare_model.py
      - config/config.yaml
    params:
      - EPOCHS
      - BATCH_SIZE
      - LEARNING_RATE
      - FEATURES_SIZE
      - EMBEDDING_SIZ
      - CLASSES

    outs:
      - artifacts/prepare_base_model 

  training:
    cmd: python src/GNNClassifier/pipeline/stage_05_Training_model.py
    deps:
      - src/GNNClassifier/pipeline/stage_05_training_model.py
      - config/config.yaml
      - params.yaml
      - artifacts/data_preparation/train_graphs
      - artifacts/data_preparation/test_graphs
      - artifacts/prepare_base_model
    params:
      - IMAGE_SIZE
      - EPOCHS
      - BATCH_SIZE
      - AUGEMENTATION
    outs:
      - artifacts/training/model.h5




  